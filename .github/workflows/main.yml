name: CI - React + Postgres
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Code
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      # TODO 1: clonar el repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # TODO 2: configurar Node.js versión 20
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # TODO 3: instalar dependencias
      - name: Install dependencies
        run: npm install

      # Tests deshabilitados según requerimiento de la Ronda 2
      # - name: Run tests
      #   run: npm test
      #   env:
      #     DATABASE_URL: postgres://test:test@localhost:5432/testdb

      # TODO 5: construir el proyecto para producción
      - name: Build
        run: npm run build
