version: "3.9"
services:
  frontend:
    build: .
    ports:
      - "8082:8080"
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: linux123
      POSTGRES_DB: desafio
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data: